name: Snapshot & Deploy

on:
  # 備援排程（主要準點觸發由外部 cron-job.org 於 UTC 00:30 打 workflow_dispatch）。
  # GitHub 排程會飄移甚至漏跑，故設兩道備援；重複執行有 sameDay 守衛、無害。
  # 非整點分鐘可避開 GitHub 整點壅塞被丟棄的問題。週二至週六＝美股週一至週五收盤資料。
  schedule:
    - cron: "40 0 * * 2-6" # UTC 00:40 ≈ 台灣 08:40（第一道備援）
    - cron: "17 2 * * 2-6" # UTC 02:17 ≈ 台灣 10:17（第二道備援）
  # 推送到主分支時也重新部署（程式變更）
  push:
    branches: [main]
  # 允許在 Actions 頁面手動觸發
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 跨執行保留 Polygon 明細快取（名稱/市值/產業），減少 API 呼叫
      - name: Restore ticker metadata cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: polygon-tickers-v1

      # 產生 public/rankings.json（含 AI 題材分析）。
      # 若資料來源暫時失敗（如 Polygon 5xx），不中斷部署 —— 沿用已 commit 的上一份快照。
      - name: Snapshot rankings
        run: node scripts/snapshot.mjs || echo "::warning::snapshot 失敗，改用 repo 內既有 rankings.json 部署"
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # 用 Pages 自動推得的 base_path（專案站台為 /repo，使用者站台為空）
      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
